name: Build and deploy PeakOrLow to Azure Web App

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Publish
        run: dotnet publish PeakOrLow.Web/PeakOrLow.Web.csproj -c Release -o ./publish

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'peakorlow'
          publish-profile: ${{ secrets.AzureAppService_PublishProfile_078a3bfd8c3f4553acb9855b288bf8a2 }}
          package: ./publish
